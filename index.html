  $("#main").querySelectorAll('[data-module]').forEach(b=>{
    b.addEventListener('click',()=>{
      const m=COURSE.find(x=>x.id===b.dataset.module);
      if(m && m.lessons.length){
        const target=m.lessons.find(l=>!done[l.id]) || m.lessons[0];
        openLesson(target.id);
      }
    });
  });
}

/* ============================================================
   Render: a lesson
   ============================================================ */
function openLesson(id){
  showingHome=false; currentId=id; persist();
  const i=flatLessons.findIndex(l=>l.id===id);
  const L=flatLessons[i], prev=flatLessons[i-1], next=flatLessons[i+1];
  const isDone=!!done[id];

  const videoBlock=L.video?`
    ${videoHolder(L.video,{tag:'Featured tutorial'})}
    <div class="video-meta">
      <span class="vm-info"><b>${esc(L.video.title)}</b> — ${esc(L.video.channel)}</span>
      <a class="yt-out" href="${ytWatch(L.video.id)}" target="_blank" rel="noopener">Open on YouTube ↗</a>
    </div>`:'';

  const moreBlock=(L.more && L.more.length)?`
    <div class="more-videos">
      <div class="mv-head">More tutorials on this topic</div>
      <div class="mv-grid">
        ${L.more.map(v=>`
          <div class="mv-item">
            ${videoHolder(v)}
            <div class="mv-body"><div class="mv-t">${esc(v.title)}</div><div class="mv-c">${esc(v.channel)}</div></div>
          </div>`).join('')}
      </div>
    </div>`:'';

  $("#main").innerHTML=`
    <section class="panel lesson view-enter">
      <div class="crumb">
        <span>Module ${L.moduleNum} · ${esc(L.moduleTitle)}</span>
        <span class="sep">/</span>
        <span class="pos">Lesson ${i+1} of ${flatLessons.length}</span>
        <span class="sep">/</span>
        <span class="dur">${esc(L.dur)}</span>
      </div>
      <h2 id="lessonH" tabindex="-1">${esc(L.title)}</h2>
      <p class="sub">${esc(L.sub)}</p>
      ${videoBlock}
      <div class="reading">${L.body}</div>
      ${moreBlock}
      <div class="lesson-foot">
        <div class="upnext" id="upnext"></div>
        <div class="foot-row">
          <button class="mark-btn ${isDone?'is-done':''}" id="markBtn">
            <span class="box"></span><span id="markLabel">${isDone?'Completed':'Mark as complete'}</span>
          </button>
          <div class="nav-btns">
            <button id="prevBtn" ${prev?'':'disabled'}>← Previous</button>
            <button id="nextBtn" ${next?'':'disabled'}>Next →</button>
          </div>
        </div>
        <div class="kbd-hint">
          <span><kbd>←</kbd> <kbd>→</kbd> move between lessons</span>
          <span><kbd>M</kbd> mark complete</span>
        </div>
      </div>
    </section>`;

  // video facade play (delegated within lesson)
  $("#main").querySelectorAll('.facade').forEach(f=>{
    f.addEventListener('click',()=>mountPlayer(f.closest('.video')));
  });

  $("#markBtn").addEventListener('click',()=>toggleDone(id, next));
  if(prev) $("#prevBtn").addEventListener('click',()=>openLesson(prev.id));
  if(next) $("#nextBtn").addEventListener('click',()=>openLesson(next.id));

  document.body.classList.remove('nav-open');
  $("#menuToggle").setAttribute('aria-expanded','false');
  window.scrollTo({top:0, behavior:'auto'});
  const h=$("#lessonH"); if(h) h.focus({preventScroll:true});
  renderSpine(); renderProgress(); updateReadBar();
}

function toggleDone(id, next){
  const becoming=!done[id];
  if(becoming) done[id]=true; else delete done[id];
  persist();
  const btn=$("#markBtn"), label=$("#markLabel");
  if(btn){
    btn.classList.toggle('is-done', becoming);
    if(label) label.textContent=becoming?'Completed':'Mark as complete';
    if(becoming){ btn.classList.add('celebrate'); setTimeout(()=>btn.classList.remove('celebrate'),420); }
  }
  const pill=$("#progPill"); if(pill && becoming){ pill.classList.add('pulse'); setTimeout(()=>pill.classList.remove('pulse'),650); }
  // up-next nudge
  const up=$("#upnext");
  if(up){
    if(becoming && next){
      up.innerHTML=`<span>✓ Nice — lesson complete.</span> <b>Up next:</b> ${esc(next.title)} <a href="#" id="goNext">Continue →</a>`;
      up.classList.add('show');
      const g=$("#goNext"); if(g) g.addEventListener('click',e=>{e.preventDefault();openLesson(next.id);});
    }else if(becoming && !next){
      up.innerHTML=`<span>✓ That's the whole track done — Foundations, Excel, Power BI, SQL, and Python. Now go build a portfolio project with it.</span>`;
      up.classList.add('show');
    }else{
      up.classList.remove('show'); up.innerHTML='';
    }
  }
  renderSpine(); renderProgress();
}

/* ============================================================
   Reading-progress bar
   ============================================================ */
function updateReadBar(){
  const bar=$("#readBar"), fill=$("#readFill");
  if(!bar||!fill) return;
  if(showingHome){ bar.style.opacity=0; fill.style.width='0%'; return; }
  bar.style.opacity=1;
  const sc=window.scrollY||document.documentElement.scrollTop;
  const h=document.documentElement.scrollHeight - window.innerHeight;
  const pct=h>0?Math.min(100,Math.max(0, sc/h*100)):0;
  fill.style.width=pct+'%';
}
let ticking=false;
window.addEventListener('scroll',()=>{ if(!ticking){ requestAnimationFrame(()=>{updateReadBar();ticking=false;}); ticking=true; }},{passive:true});

/* ============================================================
   Orchestration + events
   ============================================================ */
function goHome(){
  showingHome=true; persist();
  renderSpine(); renderProgress(); renderHome();
  updateReadBar();
  window.scrollTo({top:0,behavior:'auto'});
  document.body.classList.remove('nav-open');
  $("#menuToggle").setAttribute('aria-expanded','false');
}

$("#sidebar").addEventListener('click',e=>{
  const lb=e.target.closest('[data-lesson]'); if(lb){ openLesson(lb.dataset.lesson); return; }
  const mb=e.target.closest('[data-module]');
  if(mb){ const m=COURSE.find(x=>x.id===mb.dataset.module); if(m&&m.lessons.length){ const t=m.lessons.find(l=>!done[l.id])||m.lessons[0]; openLesson(t.id);} }
});
$("#homeLink").addEventListener('click',e=>{ e.preventDefault(); goHome(); });
$("#resetBtn").addEventListener('click',()=>{
  if(confirm('Reset all progress? This clears every completed lesson.')){
    done={}; persist(); renderSpine(); renderProgress();
    if(showingHome) renderHome(); else openLesson(currentId);
  }
});
$("#menuToggle").addEventListener('click',()=>{
  const open=document.body.classList.toggle('nav-open');
  $("#menuToggle").setAttribute('aria-expanded', open?'true':'false');
});
$("#backdrop").addEventListener('click',()=>{ document.body.classList.remove('nav-open'); $("#menuToggle").setAttribute('aria-expanded','false'); });

// keyboard navigation
document.addEventListener('keydown',e=>{
  if(e.metaKey||e.ctrlKey||e.altKey) return;
  const t=e.target;
  if(t && (t.tagName==='INPUT'||t.tagName==='TEXTAREA'||t.isContentEditable)) return;
  if(e.key==='Escape'){ document.body.classList.remove('nav-open'); $("#menuToggle").setAttribute('aria-expanded','false'); return; }
  if(showingHome) return;
  const i=flatLessons.findIndex(l=>l.id===currentId);
  if(e.key==='ArrowRight'||e.key===']'){ const n=flatLessons[i+1]; if(n){e.preventDefault();openLesson(n.id);} }
  else if(e.key==='ArrowLeft'||e.key==='['){ const p=flatLessons[i-1]; if(p){e.preventDefault();openLesson(p.id);} }
  else if(e.key==='m'||e.key==='M'){ e.preventDefault(); toggleDone(currentId, flatLessons[i+1]); }
});

// init
loadYTApi();
renderSpine(); renderProgress(); renderHome();
</script>
</body>
</html>
